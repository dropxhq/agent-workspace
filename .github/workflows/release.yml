name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*'
      - '[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*-*'

env:
  TAG: ${{ github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.ref_name }}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag '${{ github.ref_name }}' does not match CalVer format YYYY.M.D; skipping release"
          fi

  test:
    needs: validate
    if: needs.validate.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - working-directory: rust
        run: cargo test --locked

  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or refresh GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; removing old assets for re-upload"
            gh release view "$TAG" --json assets -q '.assets[].name' \
              | while read -r asset; do
                  gh release delete-asset "$TAG" "$asset" --yes
                done
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: universal-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          root: rust
          bin: ws
          target: ${{ matrix.target }}
          locked: true
          checksum: sha256
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Sync version from tag
        run: .github/scripts/sync-rust-version.sh "$TAG"

      - name: Publish to crates.io
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if curl -sf "https://crates.io/api/v1/crates/agent-workspace/$TAG" >/dev/null; then
            echo "::warning::Version $TAG is already on crates.io; skipping publish (crates.io does not allow overwriting published versions)"
            exit 0
          fi
          cargo publish --locked --allow-dirty

  build-python-wheels:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            artifact: python-wheels-linux-x86_64
          - os: ubuntu-latest
            target: aarch64
            artifact: python-wheels-linux-aarch64
          - os: macos-latest
            target: aarch64
            artifact: python-wheels-macos-aarch64
          - os: macos-15-intel
            target: x86_64
            artifact: python-wheels-macos-x86_64
          - os: windows-latest
            target: x64
            artifact: python-wheels-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync version from tag
        run: .github/scripts/sync-rust-version.sh "$TAG"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --locked --out dist --compatibility pypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync version from tag
        run: .github/scripts/sync-rust-version.sh "$TAG"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  upload-python-wheels:
    needs: [create-release, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Upload Python packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Python packages found in dist/"
            exit 1
          fi
          gh release upload "$TAG" dist/* --clobber

  publish-pypi:
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if curl -sf "https://pypi.org/pypi/agent-workspace/$TAG/json" >/dev/null; then
            echo "::warning::Version $TAG is already on PyPI; skipping publish (PyPI does not allow overwriting published versions)"
            exit 0
          fi
          uv publish dist/*
