name: Release

permissions:
  contents: write

on:
  push:
    tags:
      # Glob filters (fnmatch); strict CalVer validation runs in the validate job.
      - '[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*[a-z]*'
      - '[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*-*'

env:
  TAG: ${{ github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.ref_name }}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}([a-z][0-9A-Za-z.-]*|-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag '${{ github.ref_name }}' does not match CalVer format YYYY.M.D[.suffix]; skipping release"
          fi

  test:
    needs: validate
    if: needs.validate.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - working-directory: rust
        run: cargo test --locked

  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or refresh GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; removing old assets for re-upload"
            gh release view "$TAG" --json assets -q '.assets[].name' \
              | while read -r asset; do
                  gh release delete-asset "$TAG" "$asset" --yes
                done
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: universal-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          manifest-path: rust/Cargo.toml
          bin: ws
          target: ${{ matrix.target }}
          locked: true
          checksum: sha256
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Sync version from tag
        id: version
        shell: bash
        run: .github/scripts/sync-rust-version.sh "${{ github.ref_name }}"

      - name: Publish to crates.io
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_VERSION: ${{ steps.version.outputs.cargo_version }}
        run: |
          set -euo pipefail
          if curl -sf "https://crates.io/api/v1/crates/agent-workspace/$CARGO_VERSION" >/dev/null; then
            echo "::warning::Version $CARGO_VERSION is already on crates.io; skipping publish (crates.io does not allow overwriting published versions)"
            exit 0
          fi
          cargo publish --locked --allow-dirty

  build-python-wheels:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            artifact: python-wheels-linux-x86_64
          - os: ubuntu-latest
            target: aarch64
            artifact: python-wheels-linux-aarch64
          - os: macos-latest
            target: aarch64
            artifact: python-wheels-macos-aarch64
          - os: macos-15-intel
            target: x86_64
            artifact: python-wheels-macos-x86_64
          - os: windows-latest
            target: x64
            artifact: python-wheels-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync version from tag
        shell: bash
        run: .github/scripts/sync-rust-version.sh "${{ github.ref_name }}"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --locked --out dist --compatibility pypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync version from tag
        shell: bash
        run: .github/scripts/sync-rust-version.sh "${{ github.ref_name }}"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  upload-python-wheels:
    needs: [create-release, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Upload Python packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Python packages found in dist/"
            exit 1
          fi
          gh release upload "$TAG" dist/* --clobber

  publish-pypi:
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - uses: astral-sh/setup-uv@v5

      - name: Verify package versions match tag
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import glob
          import os
          import re
          import sys
          import tarfile
          import zipfile

          tag = os.environ["TAG"]
          expected = tag

          errors = []
          for path in sorted(glob.glob("dist/*")):
              base = os.path.basename(path)
              version_match = None
              if base.endswith(".whl"):
                  version_match = re.match(r"agent_workspace-(.+?)-cp", base)
                  with zipfile.ZipFile(path) as zf:
                      meta_name = next(n for n in zf.namelist() if n.endswith("METADATA"))
                      metadata = zf.read(meta_name).decode("utf-8")
              elif base.endswith(".tar.gz"):
                  version_match = re.match(r"agent_workspace-(.+)\.tar\.gz", base)
                  with tarfile.open(path, "r:gz") as tf:
                      pkg_info = next(
                          member.name
                          for member in tf.getmembers()
                          if member.name.endswith("PKG-INFO")
                      )
                      metadata = tf.extractfile(pkg_info).read().decode("utf-8")
              else:
                  continue
              if not version_match:
                  errors.append(f"{base}: cannot parse version from filename")
                  continue
              if version_match.group(1) != expected:
                  errors.append(
                      f"{base}: version {version_match.group(1)!r} != expected {expected!r}"
                  )
              if "Description-Content-Type:" not in metadata:
                  errors.append(f"{base}: missing Description-Content-Type (readme not embedded)")
              elif len(metadata.split("\n\n", 1)[-1].strip()) < 100:
                  errors.append(f"{base}: readme body missing or too short in metadata")

          if errors:
              print("Package version check failed:", file=sys.stderr)
              for err in errors:
                  print(f"  {err}", file=sys.stderr)
              sys.exit(1)

          print(f"All {len(glob.glob('dist/*'))} packages match version {expected} and include readme")
          PY

      - name: Yank accidental 0.1.0 release
        continue-on-error: true
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          # 0.1.0 was published before CalVer tagging; PyPI treats it as the latest
          # stable release and hides README from newer preview releases.
          status="$(curl -sS -o /tmp/yank-response.json -w '%{http_code}' \
            -X PATCH "https://pypi.org/api/projects/agent-workspace/0.1.0" \
            -H "Content-Type: application/json" \
            -u "__token__:${UV_PUBLISH_TOKEN}" \
            -d '{"yanked": true, "yanked_reason": "Accidental dev publish before CalVer versioning; use CalVer preview tags instead."}')"
          echo "Yank 0.1.0 response: HTTP $status"
          cat /tmp/yank-response.json
          if [[ "$status" != "200" && "$status" != "404" ]]; then
            exit 1
          fi

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          uv publish --check-url https://pypi.org/simple/agent-workspace/ dist/*
